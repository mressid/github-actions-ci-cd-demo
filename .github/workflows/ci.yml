name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:check
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Secrets (DOCKERHUB_USERNAME / DOCKERHUB_TOKEN) live in the "dev" GitHub Environment.
    environment: dev
    # Only push from main, not on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-application
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Build into the local daemon so we can scan before publishing.
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
      # Fail the build if the image has known HIGH/CRITICAL CVEs.
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - run: docker push ${{ env.IMAGE }} --all-tags

  notify:
    needs: [build-and-test, docker]
    runs-on: ubuntu-latest
    # DISCORD_WEBHOOK lives in the "dev" GitHub Environment.
    environment: dev
    if: failure()
    steps:
      - run: |
          curl -fsS -H "Content-Type: application/json" \
            -d "{\"text\":\"CI failed on \`${GITHUB_REF_NAME}\` — ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
