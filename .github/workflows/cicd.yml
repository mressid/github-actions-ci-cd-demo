name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:check
      - run: npm run format:check
      - run: npm test
      - name: build
        run: npm run build
      - name: Notify Discord (build & test)
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILURE"
          fi

          curl -X POST -H "Content-Type: application/json" \
          -d "{\"text\":\"Build & Test: ${STATUS} on ${GITHUB_REF_NAME} → ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
          "${{ secrets.DISCORD_WEBHOOK }}"

  docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    # Secrets (DOCKERHUB_USERNAME / DOCKERHUB_TOKEN) live in the "dev" GitHub Environment.
    environment: dev
    # Only push from main, not on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-application
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # Build into the local daemon so we can scan before publishing.
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
      # Fail the build if the image has known HIGH/CRITICAL CVEs.
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
      - run: docker push ${{ env.IMAGE }} --all-tags

      - name: Notify Discord (docker)
        if: always()
        run: |
          if [[ "${{ job.status }}" == "success" ]]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILURE"
          fi

          curl -X POST -H "Content-Type: application/json" \
          -d "{\"text\":\"Docker Build: ${STATUS} on ${GITHUB_REF_NAME} → ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
          "${{ secrets.DISCORD_WEBHOOK }}"
    
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    # DEPLOY_* and DOCKERHUB_USERNAME live in the "dev" GitHub Environment.
    environment: dev
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ci-cd-application
    steps:
      # SSH in, pull the exact image we just scanned, swap the running container.
      # ponytail: single docker run, no compose. Add compose/k8s when you need >1 service.
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE,GITHUB_SHA
          script: |
            set -e
            # ponytail: assumes a public image. Private? add a docker login here first.
            docker pull "$IMAGE:$GITHUB_SHA"
            docker rm -f ci-cd-application 2>/dev/null || true
            docker run -d --name ci-cd-application --restart unless-stopped \
              -p 80:3000 "$IMAGE:$GITHUB_SHA"

      - name: Notify Slack (deploy)
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="SUCCESS"
          else
            STATUS="FAILURE"
          fi

          curl -X POST -H "Content-Type: application/json" \
          -d "{\"text\":\"Deploy: ${STATUS} on ${GITHUB_REF_NAME} → ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
          "${{ secrets.DISCORD_WEBHOOK }}"

  notify:
    needs: [build-and-test, docker, deploy]
    runs-on: ubuntu-latest
    environment: dev
    if: failure()
    steps:
      - run: |
          curl -fsS -H "Content-Type: application/json" \
            -d "{\"text\":\"CI failed on \`${GITHUB_REF_NAME}\` — ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "${{ secrets.DISCORD_WEBHOOK }}"
